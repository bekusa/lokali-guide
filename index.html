<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f0eb;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}

.lang-item{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;font-size:14px;color:#222;transition:background 0.1s}

.locate-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#0F6E56;color:white;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:1.2rem;transition:opacity 0.15s}

.search-row{display:flex;gap:8px;margin-bottom:1.2rem}

.card:hover,.card.active{border-color:#1D9E75;background:#f7fdfb}
.card-icon{width:36px;height:36px;border-radius:9px;background:#f0faf6;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-info{flex:1}
.card-type{font-size:10px;color:#1D9E75;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:1px}
.card-name{font-size:14px;font-weight:500;color:#222}
.card-loc{font-size:11px;color:#999}
.loading{display:flex;gap:5px;align-items:center;justify-content:center;padding:8px 0}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.placeholder-box{border-radius:14px;border:1.5px dashed #ddd;padding:28px;text-align:center}
.ph-icon{font-size:34px;margin-bottom:8px}
.placeholder-box p{font-size:13px;color:#bbb;line-height:1.5}
.result-card{border-radius:14px;border:1.5px solid #e8e8e2;overflow:hidden;margin-bottom:12px}
.result-title-bar{background:#1D9E75;padding:12px 14px;color:white}
.result-title{font-size:15px;font-weight:700}
.result-duration{font-size:11px;opacity:0.8;margin-top:2px}
.result-body{padding:14px;display:flex;flex-direction:column;gap:14px}
.section-head{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#999;margin-bottom:7px}
.script-text{font-size:14px;color:#333;line-height:1.75}
.pause-tag{display:inline-block;background:#e8f5ee;color:#0F6E56;font-size:10px;padding:1px 6px;border-radius:4px;margin:0 2px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;line-height:1.4}
.chip-green{background:#e8f5ee;color:#0F6E56}
.chip-blue{background:#e6f0fb;color:#185FA5}
.chip-amber{background:#faeeda;color:#854F0B}
.list-items{display:flex;flex-direction:column;gap:6px}
.list-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#444;line-height:1.55}
.audio-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #eee;background:#fafaf7}
.speak-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1.5px solid #ccc;font-size:12px;cursor:pointer;background:white;color:#555;transition:all 0.15s}
.speak-btn:hover{border-color:#1D9E75;color:#1D9E75}
.duration-badge{font-size:11px;color:#aaa;margin-left:auto}
.map-container{border-radius:14px;overflow:hidden;border:1.5px solid #eee;margin-bottom:12px;height:220px}
.attr-card{border-radius:12px;border:1.5px solid #eee;overflow:hidden;transition:border-color 0.15s}
.attr-card:hover{border-color:#1D9E75}
.attr-header{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;background:white}
.attr-score{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:28px}
.attr-score-num{font-size:16px;font-weight:700;color:#1D9E75;line-height:1}

.attr-detail{display:none;padding:0 13px 12px;border-top:1px solid #f0f0ea;background:#fafaf7}
.attr-detail.open{display:block}
.audio-guide-btn{width:100%;padding:8px;border-radius:8px;border:none;background:#1D9E75;color:white;font-size:13px;cursor:pointer;margin-top:10px;font-weight:500}
.tabs{display:flex;border-bottom:1.5px solid #eee;margin-bottom:1.2rem}
.tab{flex:1;padding:9px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:#aaa;border:none;border-bottom:2px solid transparent;transition:all 0.15s;text-align:center}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
.tab-content{display:none}
.tab-content.active{display:block}

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD5j2rdYvTOfReGLsar9CfScLegbLipAmg&callback=initMap" async defer></script>

<script>
const GUIDE_WEBHOOK = 'https://tsitskabeka.app.n8n.cloud/webhook/guide';
const ATTRACTIONS_WEBHOOK = 'https://tsitskabeka.app.n8n.cloud/webhook/attractions';
let lang='ka', langFull='Georgian', lastScript='', speaking=false;
let map=null, markers=[];

// ========== TABS ==========
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ========== GOOGLE MAPS ==========
function initMap(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:41.6938,lng:44.8015},
    zoom:13,
    disableDefaultUI:true,
    zoomControl:true,
    styles:[{featureType:'poi',stylers:[{visibility:'off'}]}]
  });
}

function showMapWithAttractions(attractions, lat, lng){
  document.getElementById('map-area').style.display='block';
  if(!map) return;
  markers.forEach(m=>m.setMap(null));
  markers=[];
  map.setCenter({lat,lng});
  map.setZoom(13);
  attractions.forEach((a,i)=>{
    if(!a.lat||!a.lng) return;
    const marker = new google.maps.Marker({
      position:{lat:a.lat,lng:a.lng},
      map,
      title:a.name,
      label:{text:String(i+1),color:'white',fontSize:'12px',fontWeight:'bold'},
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:16,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'white',strokeWeight:2}
    });
    const iw = new google.maps.InfoWindow({
      content:`<div style="font-size:13px;font-weight:600;padding:4px">${a.icon||'📍'} ${a.name}</div>`
    });
    marker.addListener('click',()=>iw.open(map,marker));
    markers.push(marker);
  });
}

// ========== LANGUAGES ==========

  {code:'ka',full:'Georgian',flag:'🇬🇪',name:'ქართული'},
  {code:'en',full:'English',flag:'🇬🇧',name:'English'},
  {code:'ru',full:'Russian',flag:'🇷🇺',name:'Русский'},

  {code:'uk',full:'Ukrainian',flag:'🇺🇦',name:'Українська'},
  {code:'he',full:'Hebrew',flag:'🇮🇱',name:'עברית'},
  {code:'ar',full:'Arabic',flag:'🇸🇦',name:'العربية'},

];

const UI={
  ka:{place:'ადგილი',popular:'პოპულარული ადგილები',search:'ნებისმიერი ადგილი...',ask:'კითხვა',tagline:'AI მოგზაურობის გიდი — ყველა ენაზე',lang_label:'ენა',nearby:'📍 ჩემთან ახლოს სანახაობები',loading_attr:'ლოკაცია და სანახაობები...',loading_guide:'AI გიდი მზადდება...',audio:'▶ ხმოვანი გიდი',stop:'■ გაჩერება',script:'🎙️ სკრიპტი',facts:'💡 ძირითადი ფაქტები',look:'👁️ ყურადღება მიაქციე',tips:'🗺️ პრაქტიკული რჩევები',nb:'☕ ახლოს',full_guide:'🎧 სრული აუდიო გიდი'},
  en:{place:'Place',popular:'Popular Places',search:'Any place...',ask:'Search',tagline:'AI Travel Guide — Every Language',lang_label:'Language',nearby:'📍 Nearby Attractions',loading_attr:'Finding your location...',loading_guide:'AI guide preparing...',audio:'▶ Audio Guide',stop:'■ Stop',script:'🎙️ Script',facts:'💡 Key Facts',look:'👁️ Look For',tips:'🗺️ Practical Tips',nb:'☕ Nearby',full_guide:'🎧 Full Audio Guide'},
  ru:{place:'Место',popular:'Популярные места',search:'Любое место...',ask:'Найти',tagline:'AI Аудиогид — На любом языке',lang_label:'Язык',nearby:'📍 Рядом со мной',loading_attr:'Определяем локацию...',loading_guide:'ИИ готовит гид...',audio:'▶ Аудиогид',stop:'■ Стоп',script:'🎙️ Текст',facts:'💡 Ключевые факты',look:'👁️ Обратите внимание',tips:'🗺️ Советы',nb:'☕ Рядом',full_guide:'🎧 Полный аудиогид'},
};

function t(key){ return (UI[lang]||UI['en'])[key]||UI['en'][key]||key; }

const menu=document.getElementById('lang-menu');
LANGUAGES.forEach(l=>{
  const item=document.createElement('div');
  item.className='lang-item';
  item.innerHTML=`<span style="font-size:18px">${l.flag}</span><span>${l.name}</span><span style="font-size:11px;color:#aaa;margin-left:auto">${l.full}</span>`;
  item.addEventListener('click',()=>{
    lang=l.code; langFull=l.full;
    document.getElementById('lang-flag').textContent=l.flag;
    document.getElementById('lang-name').textContent=l.name;
    document.getElementById('lang-menu').style.display='none';
    updateUI();
  });
  menu.appendChild(item);
});

function toggleLangMenu(){
  const m=document.getElementById('lang-menu');
  m.style.display=m.style.display==='none'||m.style.display===''?'block':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-dropdown-wrap')) document.getElementById('lang-menu').style.display='none';
});

function updateUI(){
  document.getElementById('app-tagline').textContent=t('tagline');
  document.getElementById('label-lang').textContent=t('lang_label');
  const lp=document.getElementById('label-place'); if(lp) lp.textContent=t('place');
  const lpo=document.getElementById('label-popular'); if(lpo) lpo.textContent=t('popular').toUpperCase();
  const inp=document.getElementById('custom-input'); if(inp) inp.placeholder=t('search');
  const ab=document.getElementById('ask-btn'); if(ab) ab.textContent=t('ask')+' ↗';
  const lb=document.getElementById('locate-btn'); if(lb) lb.textContent=t('nearby');
  renderCards();
}

// ========== CARDS ==========
const CARDS_DATA=[
  {placeEn:'Narikala Fortress',location:'Tbilisi, Georgia',icon:'🏰',
   tr:{ka:{type:'ციხე-სიმაგრე',name:'ნარიყალას ციხე',loc:'თბილისი'},en:{type:'Fortress',name:'Narikala Fortress',loc:'Tbilisi'},ru:{type:'Крепость',name:'Нарикала',loc:'Тбилиси'}}},
  {placeEn:'National Museum of Georgia',location:'Tbilisi, Georgia',icon:'🏛️',
   tr:{ka:{type:'მუზეუმი',name:'ეროვნული მუზეუმი',loc:'თბილისი'},en:{type:'Museum',name:'National Museum',loc:'Tbilisi'},ru:{type:'Музей',name:'Нац. музей',loc:'Тбилиси'}}},
  {placeEn:'Jvari Monastery',location:'Mtskheta, Georgia',icon:'⛪',
   tr:{ka:{type:'მონასტერი',name:'ჯვრის მონასტერი',loc:'მცხეთა'},en:{type:'Monastery',name:'Jvari Monastery',loc:'Mtskheta'},ru:{type:'Монастырь',name:'Монастырь Джвари',loc:'Мцхета'}}},
  {placeEn:'Sighnaghi old town',location:'Kakheti, Georgia',icon:'🏘️',
   tr:{ka:{type:'ისტ. ქალაქი',name:'სიღნაღი',loc:'კახეთი'},en:{type:'Historic Town',name:'Sighnaghi',loc:'Kakheti'},ru:{type:'Ист. город',name:'Сигнахи',loc:'Кахетия'}}},
];

function renderCards(){
  const container=document.getElementById('cards-container');
  if(!container) return;
  container.innerHTML=CARDS_DATA.map(card=>{
    const tr=card.tr[lang]||card.tr['en'];
    return `<div class="card" onclick="selectPlace(this,'${card.placeEn}','${card.location}','${tr.name}')">
      <div class="card-icon">${card.icon}</div>
      <div class="card-info">
        <div class="card-type">${tr.type}</div>
        <div class="card-name">${tr.name}</div>
        <div class="card-loc">📍 ${tr.loc}</div>
      </div>
    </div>`;

// ========== NEARBY ATTRACTIONS ==========
async function loadNearbyAttractions(){
  const btn=document.getElementById('locate-btn');
  const area=document.getElementById('result-area');
  btn.disabled=true;
  area.innerHTML=`<div style="padding:24px;text-align:center"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:12px;color:#bbb;margin-top:10px">${t('loading_attr')}</p></div>`;

  try {
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000}));
    const {latitude:lat,longitude:lng}=pos.coords;

    const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}});
    const geoData=await geo.json();
    const city=geoData.address.city||geoData.address.town||geoData.address.village||geoData.address.county||'Unknown';
    const country=geoData.address.country||'';

    if(map){ map.setCenter({lat,lng}); map.setZoom(13); }
    document.getElementById('map-area').style.display='block';

    const res=await fetch(ATTRACTIONS_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({city,country,lat,lng,language:langFull})
    });
    const raw=await res.text();
    const cleaned=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
    const data=JSON.parse(cleaned);

    renderAttractions(data.attractions||[],city,country,lat,lng);
  } catch(e){
    area.innerHTML=`<div class="placeholder-box"><div class="ph-icon">⚠️</div><p>${e.message}</p></div>`;
  }
  btn.disabled=false;
}

function renderAttractions(attractions,city,country,lat,lng){
  const typeIcons={landmark:'🏛️',museum:'🎨',nature:'🌿',religious:'⛪',historic:'🏰'};

  if(map && lat && lng){
    markers.forEach(m=>m.setMap(null)); markers=[];
    map.setCenter({lat,lng}); map.setZoom(13);
    new google.maps.Marker({
      position:{lat,lng},map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#185FA5',fillOpacity:1,strokeColor:'white',strokeWeight:2},
      title:'You are here'
    });
  }

  const cards=attractions.map((a,i)=>`
    <div class="attr-card">
      <div class="attr-header" onclick="toggleAttr(${i})">
        <div class="card-icon">${a.icon||typeIcons[a.type]||'📍'}</div>
        <div style="flex:1">
          <div class="card-type">${a.type||''} · ⏱ ${a.visit_duration||''}</div>
          <div class="card-name">${a.name}</div>
          <div style="font-size:12px;color:#666;margin-top:3px;line-height:1.4">${a.outside_desc||''}</div>
        </div>
        <div class="attr-score">
          <div class="attr-score-num">${a.appeal_score||''}</div>
          <div class="attr-score-label">/ 10</div>
        </div>
      </div>
      <div class="attr-detail" id="attr-${i}">
        <p style="font-size:13px;color:#444;line-height:1.6;margin:10px 0 8px">${a.inside_desc||''}</p>
        <div class="chips">
          <span class="chip chip-amber">⭐ ${a.best_time||''}</span>
          <span class="chip chip-green">⏱ ${a.visit_duration||''}</span>
        </div>
        <button class="audio-guide-btn" onclick="event.stopPropagation();startGuide('${a.name.replace(/'/g,"\\'")}','${city}, ${country}','${a.name.replace(/'/g,"\\'")}')">
          ${t('full_guide')}
        </button>
      </div>
    </div>`).join('');

  document.getElementById('result-area').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:0.5px">📍 ${city}, ${country}</span>
      <span style="font-size:11px;color:#bbb">${attractions.length} ადგილი</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">${cards}</div>`;
}

function toggleAttr(i){
  const d=document.getElementById('attr-'+i);
  d.classList.toggle('open');
}

function startGuide(placeEn,location,placeDisplay){
  document.querySelector('[onclick="switchTab(\'search\')"]').click();
  fetchInfo(placeEn,location,placeDisplay);
}

// ========== AUDIO GUIDE ==========
function selectPlace(el,placeEn,location,placeKa){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  fetchInfo(placeEn,location,placeKa);
}

function askCustom(){
  const v=document.getElementById('custom-input').value.trim();
  if(!v) return;
  fetchInfo(v,'',v);
}

function showLoading(){
  document.getElementById('result-area').innerHTML=`
    <div style="padding:24px;text-align:center">
      <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <p style="font-size:12px;color:#bbb;margin-top:10px">${t('loading_guide')}</p>
    </div>`;
}

async function fetchInfo(placeEn,location,placeDisplay){
  showLoading();
  const btn=document.getElementById('ask-btn');
  if(btn) btn.disabled=true;
  try {
    const res=await fetch(GUIDE_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({place:placeEn,location,language:langFull,visitor_type:'tourist',duration:5})
    });
    const raw=await res.text();
    let data;
    try {
      const cleaned=raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
      data=JSON.parse(cleaned);
    } catch(e){
      data={title:placeDisplay,script:raw,key_facts:[],tips:[],look_for:[],nearby_suggestions:[]};
    }
    lastScript=data.script||raw;
    renderGuide(data);
  } catch(e){
    document.getElementById('result-area').innerHTML=`<div class="placeholder-box"><div class="ph-icon">⚠️</div><p>${e.message}</p></div>`;
  }
  if(btn) btn.disabled=false;
}

function renderGuide(data){
  const secs=data.estimated_duration_seconds||0;
  const mins=Math.round(secs/60);
  const scriptHtml=(data.script||'').split(/\n\n+/).filter(p=>p.trim()).map(p=>{
    const clean=p.trim().replace(/\[PAUSE\]/g,'<span class="pause-tag">⏸</span>');
    return `<p style="margin-bottom:13px">${clean}</p>`;
  }).join('');
  const keyFacts=(data.key_facts||[]).map(f=>`<span class="chip chip-green">💡 ${f}</span>`).join('');
  const tipIcons=['🕐','📸','☕','👗','⏱️'];
  const tips=(data.tips||[]).map((tp,i)=>`<div class="list-item"><span style="font-size:14px;flex-shrink:0">${tipIcons[i%tipIcons.length]}</span><span>${tp}</span></div>`).join('');
  const lookFor=(data.look_for||[]).map(l=>`<span class="chip chip-blue">👁 ${l}</span>`).join('');
  const nearby=(data.nearby_suggestions||[]).map(n=>`<span class="chip chip-amber">📍 ${n}</span>`).join('');

  document.getElementById('result-area').innerHTML=`
    <div class="result-card">
      <div class="result-title-bar">
        <div class="result-title">🎧 ${data.title||'Audio Guide'}</div>
        ${mins?`<div class="result-duration">⏱ ~${mins} წუთი</div>`:''}
      </div>
      <div class="result-body">
        <div><div class="section-head">${t('script')}</div><div class="script-text">${scriptHtml}</div></div>
        ${keyFacts?`<div><div class="section-head">${t('facts')}</div><div class="chips">${keyFacts}</div></div>`:''}
        ${lookFor?`<div><div class="section-head">${t('look')}</div><div class="chips">${lookFor}</div></div>`:''}
        ${tips?`<div><div class="section-head">${t('tips')}</div><div class="list-items">${tips}</div></div>`:''}
        ${nearby?`<div><div class="section-head">${t('nb')}</div><div class="chips">${nearby}</div></div>`:''}
      </div>
      <div class="audio-bar">
        <button class="speak-btn" id="speak-btn">${t('audio')}</button>
        ${mins?`<span class="duration-badge">~${mins} წთ</span>`:''}
      </div>
    </div>`;
  document.getElementById('speak-btn').addEventListener('click',toggleSpeak);
}

function toggleSpeak(){
  if(!lastScript) return;
  const btn=document.getElementById('speak-btn');
  if(speaking){speechSynthesis.cancel();speaking=false;btn.textContent=t('audio');return;}
  const u=new SpeechSynthesisUtterance(lastScript.replace(/\[PAUSE\]/g,'... '));
  const lm={ka:'ka-GE',en:'en-US',ru:'ru-RU',tr:'tr-TR',de:'de-DE',fr:'fr-FR',es:'es-ES',it:'it-IT',zh:'zh-CN',ja:'ja-JP',ko:'ko-KR',ar:'ar-SA'};
  u.lang=lm[lang]||'en-US';
  u.onend=()=>{speaking=false;const b=document.getElementById('speak-btn');if(b)b.textContent=t('audio');};
  speechSynthesis.speak(u);speaking=true;
  btn.textContent=t('stop');
}

renderCards();
</script>
</body>
</html>
