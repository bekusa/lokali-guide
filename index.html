<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f0f0eb;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem}
.app{width:100%;max-width:430px;background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.header{background:#1D9E75;padding:1.2rem 1.4rem;color:white}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:9px;display:flex;align-items:center;justify-content:center}
.app-name{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.badge{font-size:10px;background:rgba(255,255,255,0.25);padding:2px 7px;border-radius:10px;font-weight:400;margin-left:6px;vertical-align:middle}
.app-sub{font-size:12px;opacity:0.8;margin-left:44px}
.body{padding:1.2rem}
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#aaa;margin-bottom:8px}
.lang-dropdown-wrap{position:relative;margin-bottom:1.2rem}
.lang-selected{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;border:1.5px solid #e5e5e0;cursor:pointer;background:white;user-select:none}
.lang-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border:1.5px solid #e5e5e0;border-radius:10px;overflow:hidden;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.08);max-height:260px;overflow-y:auto}
.lang-item{display:flex;align-items:center;gap:10px;padding:9px 13px;cursor:pointer;font-size:14px;color:#222;transition:background 0.1s}
.lang-item:hover{background:#f5f5f0}
.locate-btn{width:100%;padding:11px;border-radius:10px;border:none;background:#0F6E56;color:white;font-size:14px;font-weight:500;cursor:pointer;margin-bottom:1.2rem;transition:opacity 0.15s}
.locate-btn:disabled{opacity:0.5;cursor:not-allowed}
.search-row{display:flex;gap:8px;margin-bottom:1.2rem}
.search-row input{flex:1;padding:9px 13px;border-radius:10px;border:1.5px solid #e5e5e0;font-size:14px;color:#222}
.search-row input:focus{outline:none;border-color:#1D9E75}
.search-row button{padding:9px 14px;border-radius:10px;border:none;background:#1D9E75;color:white;font-size:13px;font-weight:500;cursor:pointer}
.search-row button:disabled{opacity:0.5;cursor:not-allowed}
.cards{display:flex;flex-direction:column;gap:8px;margin-bottom:1.2rem}
.card{padding:10px 13px;border-radius:12px;border:1.5px solid #eee;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:10px}
.card:hover,.card.active{border-color:#1D9E75;background:#f7fdfb}
.card-icon{width:36px;height:36px;border-radius:9px;background:#f0faf6;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-info{flex:1}
.card-type{font-size:10px;color:#1D9E75;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:1px}
.card-name{font-size:14px;font-weight:500;color:#222}
.card-loc{font-size:11px;color:#999}
.loading{display:flex;gap:5px;align-items:center;justify-content:center;padding:8px 0}
.dot{width:7px;height:7px;border-radius:50%;background:#1D9E75;animation:b 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes b{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
.placeholder-box{border-radius:14px;border:1.5px dashed #ddd;padding:28px;text-align:center}
.ph-icon{font-size:34px;margin-bottom:8px}
.placeholder-box p{font-size:13px;color:#bbb;line-height:1.5}
.result-card{border-radius:14px;border:1.5px solid #e8e8e2;overflow:hidden;margin-bottom:12px}
.result-title-bar{background:#1D9E75;padding:12px 14px;color:white}
.result-title{font-size:15px;font-weight:700}
.result-duration{font-size:11px;opacity:0.8;margin-top:2px}
.result-body{padding:14px;display:flex;flex-direction:column;gap:14px}
.section-head{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#999;margin-bottom:7px}
.script-text{font-size:14px;color:#333;line-height:1.75}
.pause-tag{display:inline-block;background:#e8f5ee;color:#0F6E56;font-size:10px;padding:1px 6px;border-radius:4px;margin:0 2px;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 10px;border-radius:20px;font-size:12px;line-height:1.4}
.chip-green{background:#e8f5ee;color:#0F6E56}
.chip-blue{background:#e6f0fb;color:#185FA5}
.chip-amber{background:#faeeda;color:#854F0B}
.list-items{display:flex;flex-direction:column;gap:6px}
.list-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#444;line-height:1.55}
.audio-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid #eee;background:#fafaf7}
.speak-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:20px;border:1.5px solid #ccc;font-size:12px;cursor:pointer;background:white;color:#555;transition:all 0.15s}
.speak-btn:hover{border-color:#1D9E75;color:#1D9E75}
.duration-badge{font-size:11px;color:#aaa;margin-left:auto}
.map-container{border-radius:14px;overflow:hidden;border:1.5px solid #eee;margin-bottom:12px;height:220px}
.attr-card{border-radius:12px;border:1.5px solid #eee;overflow:hidden;transition:border-color 0.15s}
.attr-img{width:100%;height:140px;object-fit:cover;display:block;background:#f0f0eb}
.attr-img-wrap{position:relative;overflow:hidden}
.attr-img-num{position:absolute;top:8px;left:8px;background:#1D9E75;color:white;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.attr-card:hover{border-color:#1D9E75}
.attr-header{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;background:white}
.attr-score{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:28px}
.attr-score-num{font-size:16px;font-weight:700;color:#1D9E75;line-height:1}
.attr-score-label{font-size:9px;color:#aaa}
.attr-detail{display:none;padding:0 13px 12px;border-top:1px solid #f0f0ea;background:#fafaf7}
.attr-detail.open{display:block}
.tabs{display:flex;border-bottom:1.5px solid #eee;margin-bottom:1.2rem}
.tab{flex:1;padding:9px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:#aaa;border:none;border-bottom:2px solid transparent;transition:all 0.15s;text-align:center}

.audio-guide-btn{width:100%;padding:8px;border-radius:8px;border:none;background:#1D9E75;color:white;font-size:13px;cursor:pointer;margin-top:10px;font-weight:500}
.tab-content{display:none}
.tab-content.active{display:block}

<script>

// ========== TABS ==========
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-btn-'+tab).classList.add('active');
  document.getElementById('tab-nearby').style.display=tab==='nearby'?'block':'none';
  document.getElementById('tab-guide').style.display=tab==='guide'?'block':'none';
}


// ========== GOOGLE MAPS ==========
function initMap(){
  map = new google.maps.Map(document.getElementById('map'),{
    center:{lat:41.6938,lng:44.8015},
    zoom:13,
    disableDefaultUI:true,
    zoomControl:true,
    styles:[{featureType:'poi',stylers:[{visibility:'off'}]}]
  });
}

function showMapWithAttractions(attractions, lat, lng){
  document.getElementById('map-area').style.display='block';
  if(!map) return;
  markers.forEach(m=>m.setMap(null));
  markers=[];
  map.setCenter({lat,lng});
  map.setZoom(13);
  attractions.forEach((a,i)=>{
    if(!a.lat||!a.lng) return;
    const marker = new google.maps.Marker({
      position:{lat:a.lat,lng:a.lng},
      map,
      title:a.name,
      label:{text:String(i+1),color:'white',fontSize:'12px',fontWeight:'bold'},
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:16,fillColor:'#1D9E75',fillOpacity:1,strokeColor:'white',strokeWeight:2}
    });
    const iw = new google.maps.InfoWindow({
      content:'<div style="font-size:13px;font-weight:600;padding:4px">'+( a.icon||'📍')+' '+a.name+'</div>'
    });
    marker.addListener('click',()=>iw.open(map,marker));
    markers.push(marker);
  });
}

function t(key){ return (UI[lang]||UI['en'])[key]||UI['en'][key]||key; }

const menu=document.getElementById('lang-menu');
LANGUAGES.forEach(l=>{
  const item=document.createElement('div');
  item.className='lang-item';
  item.innerHTML=`<span style="font-size:18px">${l.flag}</span><span>${l.name}</span><span style="font-size:11px;color:#aaa;margin-left:auto">${l.full}</span>`;
  item.addEventListener('click',()=>{
    lang=l.code; langFull=l.full;
    document.getElementById('lang-flag').textContent=l.flag;
    document.getElementById('lang-name').textContent=l.name;
    document.getElementById('lang-menu').style.display='none';
    updateUI();
  });
  menu.appendChild(item);
});

function setDuration(btn){
  document.querySelectorAll('.dur-btn').forEach(b=>{
    b.style.background='white'; b.style.color='#555';
  });
  btn.style.background='#1D9E75'; btn.style.color='white';
  selectedDuration=parseInt(btn.dataset.dur);
}

function toggleLangMenu(){
  const m=document.getElementById('lang-menu');
  m.style.display=m.style.display==='none'||m.style.display===''?'block':'none';
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.lang-dropdown-wrap')) document.getElementById('lang-menu').style.display='none';
});

function updateUI(){
  const el = id => document.getElementById(id);
  if(el('app-tagline')) el('app-tagline').textContent=t('tagline');
  if(el('label-lang')) el('label-lang').textContent=t('lang_label');
  if(el('label-place')) el('label-place').textContent=t('place');
  if(el('label-popular')) el('label-popular').textContent=t('popular').toUpperCase();
  if(el('custom-input')) el('custom-input').placeholder=t('search');
  if(el('ask-btn')) el('ask-btn').textContent=t('ask')+' ↗';
  if(el('locate-btn')) el('locate-btn').textContent=t('search_btn');
  if(el('auto-btn')) el('auto-btn').textContent=t('gps_btn');
  if(el('city-input')) el('city-input').placeholder=t('city_ph');
  if(el('label-visitor')) el('label-visitor').textContent=t('visitor_label');
  if(el('label-duration')) el('label-duration').textContent=t('duration_label');
  if(el('label-map')) el('label-map').textContent=t('map_lbl');
  if(el('tab-btn-nearby')) el('tab-btn-nearby').textContent=t('tab_nearby');
  if(el('tab-btn-guide')) el('tab-btn-guide').textContent=t('tab_guide');

let selectedVisitorType = 'first-time tourist';

function renderVisitorTypes(){
  const menu = document.getElementById('visitor-menu');
  if(!menu) return;
  menu.innerHTML = VISITOR_TYPES.map(v=>{
    const label = v.labels[lang]||v.labels['en'];
    const isActive = v.value === selectedVisitorType;
    const bg = isActive ? '#f0faf6' : 'white';
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;font-size:13px;background:'+bg;
    div.innerHTML = '<span style="font-size:16px">'+v.icon+'</span><span style="color:#222">'+label+'</span>';
    div.addEventListener('mouseenter', ()=>div.style.background='#f5f5f0');
    div.addEventListener('mouseleave', ()=>div.style.background=bg);
    div.addEventListener('click', ()=>selectVisitor(v.value, v.icon));
    return div.outerHTML;
  }).join('');
  // re-attach events (outerHTML loses them, use event delegation)
  menu.querySelectorAll('div').forEach((el,i)=>{
    const v = VISITOR_TYPES[i];
    el.addEventListener('click', ()=>selectVisitor(v.value, v.icon));
    el.addEventListener('mouseenter', ()=>el.style.background='#f5f5f0');
    el.addEventListener('mouseleave', ()=>el.style.background= v.value===selectedVisitorType?'#f0faf6':'white');
  });
  const cur = VISITOR_TYPES.find(v=>v.value===selectedVisitorType)||VISITOR_TYPES[0];
  const nameEl = document.getElementById('visitor-name');
  const iconEl = document.getElementById('visitor-icon');
  if(nameEl) nameEl.textContent = cur.labels[lang]||cur.labels['en'];
  if(iconEl) iconEl.textContent = cur.icon;
}

function selectVisitor(value, icon){
  selectedVisitorType = value;
  const cur = VISITOR_TYPES.find(v=>v.value===value);
  document.getElementById('visitor-name').textContent = cur.labels[lang]||cur.labels['en'];
  document.getElementById('visitor-icon').textContent = icon;
  document.getElementById('visitor-menu').style.display='none';
}

function toggleVisitorMenu(){
  const m = document.getElementById('visitor-menu');
  if(m.style.display==='none'){ renderVisitorTypes(); m.style.display='block'; }
  else m.style.display='none';
}

document.addEventListener('click', e=>{

async function loadNearbyAttractions(){
  const cityVal = document.getElementById('city-input').value.trim();
  if(!cityVal){ alert('ჩაწერე ქალაქის სახელი'); return; }
  const btn=document.getElementById('locate-btn');
  btn.disabled=true;
  (document.getElementById('attractions-area')||{}).innerHTML=`<div style="padding:24px;text-align:center"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:12px;color:#bbb;margin-top:10px">${t('loading_attr')}</p></div>`;

  try {
    // Geocode the entered city
    const geo=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(cityVal)}&format=json&limit=1`,{headers:{'Accept-Language':'en'}});
    const geoData=await geo.json();
    let lat=41.6938, lng=44.8015, city=cityVal, country='';
    if(geoData.length>0){
      lat=parseFloat(geoData[0].lat);
      lng=parseFloat(geoData[0].lon);
      const parts=geoData[0].display_name.split(',');
      city=parts[0].trim();
      country=parts[parts.length-1].trim();
    }

    if(map){
      map.setCenter({lat,lng}); map.setZoom(13);
      // user location dot
      new google.maps.Marker({
        position:{lat,lng}, map,
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:8,fillColor:'#185FA5',fillOpacity:1,strokeColor:'white',strokeWeight:2},
        title:'You are here', zIndex:999
      });
    }
    document.getElementById('map-area').style.display='block';

    const res=await fetch(ATTRACTIONS_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({city,country,lat,lng,language:langFull})
    });
    const raw=await res.text();
    const data=parseGuideResponse(raw, city);

    renderAttractions(data.attractions||[],city,country,lat,lng);
  } catch(e){
    (document.getElementById('attractions-area')||{}).innerHTML=`<div class="placeholder-box"><div class="ph-icon">⚠️</div><p>${e.message}</p></div>`;
  }
  btn.disabled=false;
}

async function autoDetectCity(){
  const btn=document.getElementById('auto-btn');
  btn.disabled=true; btn.textContent='🔄 ძებნა...';
  try {
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,enableHighAccuracy:true}));
    const {latitude:lat,longitude:lng}=pos.coords;
    const geo=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,{headers:{'Accept-Language':'en'}});
    const geoData=await geo.json();
    const city=geoData.address.city||geoData.address.town||geoData.address.village||geoData.address.county||'';
    if(city) document.getElementById('city-input').value=city;
  } catch(e){
    alert('GPS ვერ მოიძებნა: '+e.message);
  }
  btn.disabled=false; btn.textContent='🎯 ავტო-აღმოჩენა GPS-ით';
}

function fetchPlacePhoto(name, callback){
  if(!window.google || !window.google.maps || !window.google.maps.places){
    callback(null); return;
  }
  const service = new google.maps.places.PlacesService(document.createElement('div'));
  service.findPlaceFromQuery(
    {query: name, fields: ['photos','name']},
    (results, status)=>{
      if(status===google.maps.places.PlacesServiceStatus.OK && results[0] && results[0].photos){
        const photo = results[0].photos[0];
        callback(photo.getUrl({maxWidth:400, maxHeight:220}));
      } else {
        callback(null);
      }
    }
  );
}

function toggleAttr(i){
  const d=document.getElementById('attr-'+i);
  const wasOpen = d.classList.contains('open');
  d.classList.toggle('open');
  if(!wasOpen){
    // Only init if first time opening (not yet set)
    const firstOpen = !cardV[i] && !cardD[i];
    if(!cardV[i]) cardV[i]=selectedVisitorType||'first-time tourist';
    if(!cardD[i]) cardD[i]=selectedDuration||3;
    if(firstOpen){
      // Update UI only on first open
      const cur=VISITOR_TYPES.find(v=>v.value===cardV[i])||VISITOR_TYPES[0];
      const ic=document.getElementById('cvi-'+i);
      const nm=document.getElementById('cvn-'+i);
      if(ic) ic.textContent=cur.icon;
      if(nm) nm.textContent=cur.labels[lang]||cur.labels.en;
      const wrap=document.getElementById('cdb-wrap-'+i);
      if(wrap) wrap.querySelectorAll('.cdb').forEach(b=>{
        const active=parseInt(b.dataset.dur)===cardD[i];
        b.style.background=active?'#1D9E75':'white';
        b.style.color=active?'white':'#555';
      });
    }
  }
}

function parseGuideResponse(raw, fallbackTitle){
  let text = raw.trim();
  // Strip markdown fences - handle ```json\n...\n``` pattern
  text = text.replace(/^```[a-zA-Z]*\n?/, '').replace(/\n?```$/, '').trim();
  // Try direct parse
  try { return JSON.parse(text); } catch(e){}
  // Try extracting first {...} block (greedy)
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}');
  if(start !== -1 && end !== -1 && end > start){
    try { return JSON.parse(text.slice(start, end+1)); } catch(e){}
  }
  // Fallback: treat as plain script
  return {title:fallbackTitle, script:text, key_facts:[], tips:[], look_for:[], nearby_suggestions:[]};
}

async function fetchInfoWithParams(placeEn,location,placeDisplay,visitorType,duration){
  const btn=document.getElementById('ask-btn');
  if(btn) btn.disabled=true;
  try {
    const res=await fetch(GUIDE_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({place:placeEn,location,language:langFull,visitor_type:visitorType||'tourist',duration:duration||5})
    });
    const raw=await res.text();
    let data;
    try {
      data = parseGuideResponse(raw, placeDisplay);
    } catch(e){
      data={title:placeDisplay,script:raw,key_facts:[],tips:[],look_for:[],nearby_suggestions:[]};
    }
    lastScript=data.script||raw;
    renderGuide(data);
  } catch(e){
    const _ra1=document.getElementById('result-area'); if(_ra1) _ra1.innerHTML='<div class="placeholder-box"><div class="ph-icon">⚠️</div><p>'+e.message+'</p></div>';
  }
  if(btn) btn.disabled=false;
}

async function fetchInfo(placeEn,location,placeDisplay){
  const btn=document.getElementById('ask-btn');
  if(btn) btn.disabled=true;
  try {
    const res=await fetch(GUIDE_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({place:placeEn,location,language:langFull,visitor_type:selectedVisitorType,duration:selectedDuration})
    });
    const raw=await res.text();
    let data;
    try {
      let cleaned=raw.trim(); if(cleaned.startsWith('```')){cleaned=cleaned.split('\n').slice(1).join('\n');cleaned=cleaned.replace(/```\s*$/,'').trim();}
      data=JSON.parse(cleaned);
    } catch(e){
      data={title:placeDisplay,script:raw,key_facts:[],tips:[],look_for:[],nearby_suggestions:[]};
    }
    lastScript=data.script||raw;
    renderGuide(data);
  } catch(e){
    const _ra2=document.getElementById('result-area'); if(_ra2) _ra2.innerHTML=`<div class="placeholder-box"><div class="ph-icon">⚠️</div><p>${e.message}</p></div>`;
  }
  if(btn) btn.disabled=false;
}

function renderGuide(data){
  const secs=data.estimated_duration_seconds||0;
  const mins=Math.round(secs/60);
  const _script=(data.script||'').replace(/\\n/g,'\n').replace(/\\t/g,' ');
  const scriptHtml=_script.split(/\n\n+/).filter(p=>p.trim()).map(p=>{
    const clean=p.trim().replace(/\[PAUSE\]/g,'<span class="pause-tag">⏸</span>');
    return `<p style="margin-bottom:13px">${clean}</p>`;
  }).join('');
  const keyFacts=(data.key_facts||[]).map(f=>`<span class="chip chip-green">💡 ${f}</span>`).join('');
  const tipIcons=['🕐','📸','☕','👗','⏱️'];
  const tips=(data.tips||[]).map((tp,i)=>`<div class="list-item"><span style="font-size:14px;flex-shrink:0">${tipIcons[i%tipIcons.length]}</span><span>${tp}</span></div>`).join('');
  const lookFor=(data.look_for||[]).map(l=>`<span class="chip chip-blue">👁 ${l}</span>`).join('');
  const nearby=(data.nearby_suggestions||[]).map(n=>`<span class="chip chip-amber">📍 ${n}</span>`).join('');

  const backBtn = `<button onclick="switchTab('nearby')" style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.4);background:transparent;color:white;font-size:11px;cursor:pointer;margin-bottom:8px">← ${t('tab_nearby')}</button>`;
  const _ra4=document.getElementById('result-area'); if(_ra4) _ra4.innerHTML=`
    <div class="result-card">
      <div class="result-title-bar">
        ${backBtn}
        <div class="result-title">🎧 ${data.title||'Audio Guide'}</div>
        <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
          ${currentCardIndex>=0 ? (() => {
            const vt = cardV[currentCardIndex]||'first-time tourist';
            const dur = cardD[currentCardIndex]||3;
            const vtObj = VISITOR_TYPES.find(v=>v.value===vt)||VISITOR_TYPES[0];
            const durObj = DURATION_OPTIONS.find(d=>d.dur===dur)||DURATION_OPTIONS[0];
            return '<span style="font-size:11px;background:rgba(255,255,255,0.2);padding:3px 8px;border-radius:10px">'+vtObj.icon+' '+( vtObj.labels[lang]||vtObj.labels.en)+'</span>'+
                   '<span style="font-size:11px;background:rgba(255,255,255,0.2);padding:3px 8px;border-radius:10px">'+durObj.icon+' '+(durObj.labels[lang]||durObj.labels.en)+'</span>';
          })() : ''}
          ${mins?'<span style="font-size:11px;background:rgba(255,255,255,0.2);padding:3px 8px;border-radius:10px">⏱ ~'+mins+' '+( lang==='ka'?'წთ':'min')+'</span>':''}
        </div>
      </div>
      <div class="result-body">
        <div><div class="section-head">${t('script')}</div><div class="script-text">${scriptHtml}</div></div>
        ${keyFacts?`<div><div class="section-head">${t('facts')}</div><div class="chips">${keyFacts}</div></div>`:''}
        ${lookFor?`<div><div class="section-head">${t('look')}</div><div class="chips">${lookFor}</div></div>`:''}
        ${tips?`<div><div class="section-head">${t('tips')}</div><div class="list-items">${tips}</div></div>`:''}
        ${nearby?`<div><div class="section-head">${t('nb')}</div><div class="chips">${nearby}</div></div>`:''}
      </div>
      <div class="audio-bar">
        <button class="speak-btn" id="speak-btn">${t('audio')}</button>
        ${mins?`<span class="duration-badge">~${mins} წთ</span>`:''}
      </div>
    </div>`;
  const spk=document.getElementById('speak-btn'); if(spk) spk.addEventListener('click',toggleSpeak);
}

window._startGuideWithParams = function(placeEn, location, placeDisplay, visitorType, duration){
  infoWindows.forEach(w=>w.close());
  switchTab('guide');
  document.querySelector('.app').scrollIntoView({behavior:'smooth',block:'start'});
  const _ra3=document.getElementById('result-area'); if(_ra3) _ra3.innerHTML='<div style="padding:24px;text-align:center"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p style="font-size:12px;color:#bbb;margin-top:10px">'+t('loading_guide')+'</p></div>';
  fetchInfoWithParams(placeEn, location, placeDisplay, visitorType, duration);
};

window._startGuide = function(placeEn, location, placeDisplay){
  window._startGuideWithParams(placeEn, location, placeDisplay, selectedVisitorType||'first-time tourist', selectedDuration||3);
};

const cardV={}, cardD={};

function toggleCV(i){
  const m=document.getElementById('cvm-'+i);
  if(!m) return;
  if(m.style.display!=='none'){m.style.display='none';return;}
  m.innerHTML='';
  VISITOR_TYPES.forEach(v=>{
    const el=document.createElement('div');
    const lbl=v.labels[lang]||v.labels.en;
    const active=(cardV[i]||'first-time tourist')===v.value;
    el.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;font-size:12px;background:'+(active?'#f0faf6':'white');
    el.innerHTML='<span style="font-size:14px">'+v.icon+'</span><span>'+lbl+'</span>';
    el.onmouseenter=()=>el.style.background='#f5f5f0';
    el.onmouseleave=()=>el.style.background=active?'#f0faf6':'white';
    el.onclick=()=>{
      cardV[i]=v.value;
      const ic=document.getElementById('cvi-'+i);
      const nm=document.getElementById('cvn-'+i);
      if(ic) ic.textContent=v.icon;
      if(nm) nm.textContent=lbl;
      m.style.display='none';
    };
    m.appendChild(el);
  });
  m.style.display='block';
}

function setCD(i,btn){
  const wrap=btn.closest('div');
  if(wrap) wrap.querySelectorAll('.cdb').forEach(b=>{b.style.background='white';b.style.color='#555';});
  btn.style.background='#1D9E75'; btn.style.color='white';
  cardD[i]=parseInt(btn.dataset.dur);
}

document.addEventListener('click',e=>{
  if(!e.target.closest('[id^="cvw-"]'))
    document.querySelectorAll('[id^="cvm-"]').forEach(m=>m.style.display='none');
});

function launchGuide(i){
  const a=currentAttractions[i];
  if(!a) return;
  currentCardIndex=i;
  const vt=cardV[i]||selectedVisitorType||'first-time tourist';
  const dur=cardD[i]||selectedDuration||3;
  window._startGuideWithParams(a.name,currentCity+', '+currentCountry,a.name,vt,dur);
}

window._startGuideByCard=function(i){ launchGuide(i); };
window._startGuideById=function(i){
  const a=currentAttractions[i];
  if(!a) return;
  window._startGuide(a.name,currentCity+', '+currentCountry,a.name);
};

function toggleSpeak(){
  if(!lastScript) return;
  const btn=document.getElementById('speak-btn');
  if(speaking){speechSynthesis.cancel();speaking=false;btn.textContent=t('audio');return;}
  const u=new SpeechSynthesisUtterance(lastScript.replace(/\[PAUSE\]/g,'... '));
  const lm={ka:'ka-GE',en:'en-US',ru:'ru-RU',tr:'tr-TR',de:'de-DE',fr:'fr-FR',es:'es-ES',it:'it-IT',zh:'zh-CN',ja:'ja-JP',ko:'ko-KR',ar:'ar-SA'};
  u.lang=lm[lang]||'en-US';
  u.onend=()=>{speaking=false;const b=document.getElementById('speak-btn');if(b)b.textContent=t('audio');};
  speechSynthesis.speak(u);speaking=true;
  btn.textContent=t('stop');
}

renderCards();
renderVisitorTypes();
renderDurationButtons();
</script>
